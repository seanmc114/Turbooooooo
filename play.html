<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Turbooooooo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<main class="wrap playWrap">
  <div class="topBar">
    <button id="homeBtn" class="ghost" type="button">← Levels</button>
    <div class="pill" id="pill">Level</div>
  </div>

  <h1>Turbooooooo</h1>
  <div class="turnLine">Question <span id="turnNo">1</span>/10</div>

  <div class="taskBox taskBoxSolo">
    <span id="question">Loading question…</span>
  </div>

  <div class="controls" style="justify-content:center;">
    <button id="serBtn" type="button">SER</button>
    <button id="estarBtn" class="smallBtn" type="button">ESTAR</button>
  </div>

  <section id="out" class="card hidden"></section>
</main>

<footer>© 2026 Synge St Games — imagination and perseverance</footer>

<script src="script.js"></script>
</body>
</html>
