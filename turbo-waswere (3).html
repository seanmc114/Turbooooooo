    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: 'Nunito', Arial, sans-serif;
      margin: 0; padding: 16px 12px 60px;
      display: flex; justify-content: center; align-items: flex-start;
      min-height: 100vh;
      background: #1a0a2e;
      background-image:
        radial-gradient(ellipse at 15% 20%, rgba(180,80,255,0.22) 0%, transparent 50%),
        radial-gradient(ellipse at 85% 75%, rgba(255,80,120,0.18) 0%, transparent 50%);
      background-attachment: fixed;
    }
    .container {
      text-align: center; width: 100%; max-width: 580px;
      padding: 32px 20px 40px;
      background: linear-gradient(160deg, rgba(255,255,255,0.9) 0%, rgba(245,240,255,0.9) 100%);
      border-radius: 24px;
      box-shadow: 0 10px 50px rgba(0,0,0,0.45), 0 0 0 3px rgba(160,100,220,0.2);
      color: #333; position: relative; overflow: hidden;
    }

    .container > *:not(.crest-watermark) { position: relative; z-index: 1; }
    /* Rainbow top bar — CSS only, no JS */
    .container::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 6px; z-index: 2;
      background: linear-gradient(90deg,#b44fff,#ff4f8b,#4fa3ff,#ff9f40,#b44fff);
      background-size: 300% 100%;
      animation: stripe 6s linear infinite;
    }
    @keyframes stripe { from{background-position:0%} to{background-position:300%} }

    h1 { font-size: clamp(3.5rem,14vw,5.5rem); margin: 8px 0 4px; line-height: 1; }
    h1 span.turbo {
      display: inline-block; font-weight: 900; transform: skewX(-10deg);
      background: linear-gradient(135deg,#b44fff 20%,#ff4f8b 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      filter: drop-shadow(2px 3px 6px rgba(180,80,255,0.4));
    }
    .subtitle {
      font-size: clamp(0.75rem,3vw,1rem); font-weight: 800; color: #8855cc;
      letter-spacing: 2px; text-transform: uppercase; margin-bottom: 22px;
    }

    /* Level buttons */
    #level-list {
      display: flex; flex-direction: column; align-items: center; gap: 10px; margin-top: 12px;
    }
    #level-list button {
      font-family: 'Nunito', Arial, sans-serif;
      font-size: clamp(1rem,3.5vw,1.15rem); font-weight: 800;
      padding: 14px 18px; border-radius: 14px; border: none; cursor: pointer;
      width: 96%; max-width: 440px; color: white; text-align: left;
      position: relative; overflow: hidden;
      box-shadow: 0 4px 0 rgba(0,0,0,0.2);
      text-shadow: 0 1px 3px rgba(0,0,0,0.25);
      /* No transform animations on level list — smoother on phones */
      transition: opacity 0.15s;
    }
    #level-list button:not(:disabled):active { opacity: 0.8; }
    #level-list button:nth-child(1)  { background: linear-gradient(130deg,#6a3de8,#9b59b6); }
    #level-list button:nth-child(2)  { background: linear-gradient(130deg,#8e44ad,#b44fff); }
    #level-list button:nth-child(3)  { background: linear-gradient(130deg,#c0392b,#e74c3c); }
    #level-list button:nth-child(4)  { background: linear-gradient(130deg,#a04000,#d35400); }
    #level-list button:nth-child(5)  { background: linear-gradient(130deg,#1a6ca0,#4fa3ff); }
    #level-list button:nth-child(6)  { background: linear-gradient(130deg,#154a6e,#2980b9); }
    #level-list button:nth-child(7)  { background: linear-gradient(130deg,#6a3de8,#c0392b); }
    #level-list button:nth-child(8)  { background: linear-gradient(130deg,#8e44ad,#d35400); }
    #level-list button:nth-child(9)  { background: linear-gradient(130deg,#1a6ca0,#8e44ad); }
    #level-list button:nth-child(10) {
      background: linear-gradient(90deg,#b44fff,#ff4f8b,#4fa3ff,#ff9f40,#b44fff);
      background-size: 300% 100%; animation: stripe 4s linear infinite;
      font-size: clamp(1rem,3.5vw,1.2rem); text-align: center;
    }
    #level-list button:disabled {
      background: #aab0bc !important; animation: none !important;
      cursor: not-allowed; opacity: 0.55; box-shadow: none;
    }

    /* Game */
    #game { margin-top: 16px; }
    #timer {
      font-size: clamp(1.2rem,5vw,1.5rem); font-weight: 900; color: #8855cc;
      margin-bottom: 18px; padding: 8px 24px;
      background: rgba(136,85,204,0.1); border-radius: 50px;
      border: 2px solid rgba(136,85,204,0.2); display: inline-block;
    }
    .question-block {
      margin: 10px 0; text-align: left;
      background: rgba(136,85,204,0.07);
      border-radius: 12px; padding: 12px 16px 14px;
      border-left: 5px solid #9b59b6;
    }
    .trigger-label {
      font-size: 0.75rem; font-weight: 800; color: #9b59b6; display: block;
      margin-bottom: 4px; text-transform: uppercase; letter-spacing: 1px;
    }
    .question-block strong {
      font-size: clamp(1rem,4vw,1.15rem); font-weight: 800; color: #1a0a2e;
    }
    #questions input {
      font-family: 'Nunito', Arial, sans-serif;
      font-size: clamp(1rem,4vw,1.15rem); font-weight: 700;
      padding: 10px 14px; width: 88%; margin: 8px 0 0 0; display: block;
      border: 2.5px solid #d0c0e8; border-radius: 12px;
      outline: none; background: #fff; color: #222;
      /* No transition on mobile — avoids repaint lag */
    }
    #questions input:focus { border-color: #9b59b6; box-shadow: 0 0 0 3px rgba(155,89,182,0.15); }
    #questions input::placeholder { color: #c0b0d8; }

    @keyframes shake {
      0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)}
    }

    /* Action buttons */
    #submit, #back-button, .try-again {
      font-family: 'Nunito', Arial, sans-serif;
      font-size: clamp(1.1rem,4.5vw,1.35rem); font-weight: 900;
      padding: 14px 28px; border-radius: 14px; border: none; cursor: pointer;
      margin: 8px 6px; color: white;
      box-shadow: 0 4px 0 rgba(0,0,0,0.2);
      text-shadow: 0 1px 2px rgba(0,0,0,0.15);
    }
    #submit      { background: linear-gradient(135deg,#ff9f40,#e67e22); }
    .try-again   { background: linear-gradient(135deg,#9b59b6,#6a3de8); }
    #back-button { background: linear-gradient(135deg,#4fa3ff,#1a6ca0); }

    /* Results */
    #results { margin-top: 20px; font-size: clamp(1rem,3.8vw,1.15rem); }
    #results h3 {
      font-size: clamp(1.5rem,6vw,2rem); font-weight: 900;
      background: linear-gradient(135deg,#b44fff,#ff4f8b);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      margin-bottom: 8px;
    }
    #results p { margin: 5px 0; }
    #results h4 {
      margin: 14px 0 6px; font-size: 0.85rem; font-weight: 800;
      color: #9b59b6; text-transform: uppercase; letter-spacing: 1px;
    }
    .perfect-celebration {
      font-size: clamp(2rem,8vw,2.8rem); font-weight: 900; color: gold;
      animation: celebrate 1s ease-in-out infinite alternate;
      margin-bottom: 16px;
    }
    @keyframes celebrate {
      0%{transform:scale(1);color:gold} 50%{transform:scale(1.25) rotate(8deg);color:orange} 100%{transform:scale(1);color:gold}
    }
    footer {
      margin-top: 30px; padding-top: 16px;
      border-top: 1px solid rgba(155,89,182,0.2);
      font-size: 0.78rem; font-weight: 700; color: #9988aa; letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="crest-watermark"></div>
    <h1><span class="turbo">TURBO</span></h1>
    <p class="subtitle">Was &amp; Were — Spanish Past</p>
    <div id="level-list"></div>
    <div id="game" style="display:none;">
      <div id="timer">Time: 0s</div>
      <div id="questions"></div>
      <button id="submit">Check Answers</button>
      <div id="results"></div>
    </div>
    <footer>&copy; Synge Street Games 2026 &mdash; Imagination and Perseverance</footer>
  </div>

  <script>
const LEVEL_DATA = {
  1: [
    { trigger: "past tense", en: "I was",         es: "fui" },
    { trigger: "past tense", en: "I was not",     es: "no fui" },
    { trigger: "past tense", en: "Was I?",        es: "¿fui?" },
    { trigger: "past tense", en: "you were",      es: "fuiste" },
    { trigger: "past tense", en: "you were not",  es: "no fuiste" },
    { trigger: "past tense", en: "were you?",     es: "¿fuiste?" },
    { trigger: "past tense", en: "he was",        es: "fue" },
    { trigger: "past tense", en: "he was not",    es: "no fue" },
    { trigger: "past tense", en: "was he?",       es: "¿fue?" },
    { trigger: "past tense", en: "she was",       es: "fue" },
    { trigger: "past tense", en: "she was not",   es: "no fue" },
    { trigger: "past tense", en: "was she?",      es: "¿fue?" },
    { trigger: "past tense", en: "we were",       es: "fuimos" },
    { trigger: "past tense", en: "we were not",   es: "no fuimos" },
    { trigger: "past tense", en: "were we?",      es: "¿fuimos?" },
    { trigger: "past tense", en: "they were",     es: "fueron" },
    { trigger: "past tense", en: "they were not", es: "no fueron" },
    { trigger: "past tense", en: "were they?",    es: "¿fueron?" },
  ],
  2: [
    { trigger: "past tense", en: "I was",         es: "era" },
    { trigger: "past tense", en: "I was not",     es: "no era" },
    { trigger: "past tense", en: "was I?",        es: "¿era?" },
    { trigger: "past tense", en: "you were",      es: "eras" },
    { trigger: "past tense", en: "you were not",  es: "no eras" },
    { trigger: "past tense", en: "were you?",     es: "¿eras?" },
    { trigger: "past tense", en: "he was",        es: "era" },
    { trigger: "past tense", en: "he was not",    es: "no era" },
    { trigger: "past tense", en: "was he?",       es: "¿era?" },
    { trigger: "past tense", en: "she was",       es: "era" },
    { trigger: "past tense", en: "she was not",   es: "no era" },
    { trigger: "past tense", en: "was she?",      es: "¿era?" },
    { trigger: "past tense", en: "we were",       es: "éramos" },
    { trigger: "past tense", en: "we were not",   es: "no éramos" },
    { trigger: "past tense", en: "were we?",      es: "¿éramos?" },
    { trigger: "past tense", en: "they were",     es: "eran" },
    { trigger: "past tense", en: "they were not", es: "no eran" },
    { trigger: "past tense", en: "were they?",    es: "¿eran?" },
  ],
  3: [
    { trigger: "past tense", en: "I was",         es: "estuve" },
    { trigger: "past tense", en: "I was not",     es: "no estuve" },
    { trigger: "past tense", en: "was I?",        es: "¿estuve?" },
    { trigger: "past tense", en: "you were",      es: "estuviste" },
    { trigger: "past tense", en: "you were not",  es: "no estuviste" },
    { trigger: "past tense", en: "were you?",     es: "¿estuviste?" },
    { trigger: "past tense", en: "he was",        es: "estuvo" },
    { trigger: "past tense", en: "he was not",    es: "no estuvo" },
    { trigger: "past tense", en: "was he?",       es: "¿estuvo?" },
    { trigger: "past tense", en: "she was",       es: "estuvo" },
    { trigger: "past tense", en: "she was not",   es: "no estuvo" },
    { trigger: "past tense", en: "was she?",      es: "¿estuvo?" },
    { trigger: "past tense", en: "we were",       es: "estuvimos" },
    { trigger: "past tense", en: "we were not",   es: "no estuvimos" },
    { trigger: "past tense", en: "were we?",      es: "¿estuvimos?" },
    { trigger: "past tense", en: "they were",     es: "estuvieron" },
    { trigger: "past tense", en: "they were not", es: "no estuvieron" },
    { trigger: "past tense", en: "were they?",    es: "¿estuvieron?" },
  ],
  4: [
    { trigger: "past tense", en: "I was",                     es: "estaba" },
    { trigger: "past tense", en: "I was not",                 es: "no estaba" },
    { trigger: "past tense", en: "was I?",                    es: "¿estaba?" },
    { trigger: "past tense", en: "you were",                  es: "estabas" },
    { trigger: "past tense", en: "you were not",              es: "no estabas" },
    { trigger: "past tense", en: "were you?",                 es: "¿estabas?" },
    { trigger: "past tense", en: "he was",                    es: "estaba" },
    { trigger: "past tense", en: "she was",                   es: "estaba" },
    { trigger: "past tense", en: "we were",                   es: "estábamos" },
    { trigger: "past tense", en: "they were",                 es: "estaban" },
    { trigger: "past tense", en: "there was",                 es: "hubo" },
    { trigger: "past tense", en: "there were",                es: "hubo" },
    { trigger: "past tense", en: "there was not",             es: "no hubo" },
    { trigger: "past tense", en: "was there?",                es: "¿hubo?" },
    { trigger: "past tense", en: "there was (ongoing)",       es: "había" },
    { trigger: "past tense", en: "there were (ongoing)",      es: "había" },
    { trigger: "past tense", en: "there was not (ongoing)",   es: "no había" },
    { trigger: "past tense", en: "was there? (ongoing)",      es: "¿había?" },
  ],
};

const ALL_ITEMS = Object.values(LEVEL_DATA).flat();
for(let i=5;i<=10;i++) LEVEL_DATA[i]=null;

const LEVEL_LABELS = {
  1:"Level 1 — ser: was / were",
  2:"Level 2 — ser: was / were (describing)",
  3:"Level 3 — estar: was / were",
  4:"Level 4 — estar: was / were + there was",
  5:"Level 5 — Mixed",
  6:"Level 6 — Mixed",
  7:"Level 7 — Mixed",
  8:"Level 8 — Mixed",
  9:"Level 9 — Mixed",
  10:"Level 10 — FULL MIX 🔥",
};

let currentLevel=1, unlockedLevels=1, gameVerbs=[], startTime, timerInterval;
const levelList=document.getElementById("level-list");
const gameContainer=document.getElementById("game");
const questionsContainer=document.getElementById("questions");
const resultsContainer=document.getElementById("results");

renderLevels();

function renderLevels(){
  levelList.style.display="flex";
  gameContainer.style.display="none";
  levelList.innerHTML="";
  for(let i=1;i<=10;i++){
    const btn=document.createElement("button");
    const best=localStorage.getItem("bestTime_WasWere_Level"+i);
    const locked=i>unlockedLevels;
    btn.textContent=locked?LEVEL_LABELS[i]+" 🔒":LEVEL_LABELS[i]+(best?"  ·  Best: "+best+"s":"");
    btn.disabled=locked;
    btn.addEventListener("click",()=>startGame(i));
    levelList.appendChild(btn);
  }
}

function startGame(level){
  currentLevel=level;
  const pool=shuffleArray(LEVEL_DATA[level]?[...LEVEL_DATA[level]]:[...ALL_ITEMS]);
  gameVerbs=pool.slice(0,10);
  levelList.style.display="none";
  gameContainer.style.display="block";
  questionsContainer.innerHTML="";
  resultsContainer.innerHTML="";
  gameVerbs.forEach(item=>{
    const div=document.createElement("div");
    div.className="question-block";
    div.innerHTML='<span class="trigger-label">'+item.trigger+'</span><strong>'+item.en+'</strong><input type="text" data-answer="'+item.es+'" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" placeholder="Spanish…">';
    questionsContainer.appendChild(div);
  });
  const inputs=questionsContainer.querySelectorAll("input");
  inputs.forEach((input,idx)=>{
    input.addEventListener("keydown",e=>{
      if(e.key==="Enter"){
        e.preventDefault();
        if(idx<inputs.length-1) inputs[idx+1].focus();
        else document.getElementById("submit").click();
      }
    });
  });
  if(inputs[0]) inputs[0].focus();
  startTimer();
}

function shuffleArray(arr){
  for(let i=arr.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}

function startTimer(){
  startTime=Date.now();
  timerInterval=setInterval(()=>{
    document.getElementById("timer").textContent="Time: "+Math.floor((Date.now()-startTime)/1000)+"s";
  },1000);
}
function stopTimer(){ clearInterval(timerInterval); }

const normalize=s=>s.trim().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[¿¡]/g,"");

document.getElementById("submit").addEventListener("click",()=>{
  stopTimer();
  const elapsed=Math.floor((Date.now()-startTime)/1000);
  let penalty=0, correct=0;
  document.querySelectorAll("#questions input").forEach(input=>{
    if(normalize(input.value)===normalize(input.dataset.answer)){
      correct++;
      input.style.border="2.5px solid #27ae60";
      input.style.background="#f0fff6";
    } else {
      penalty+=30;
      input.style.border="2.5px solid #e74c3c";
      input.style.background="#fff5f5";
      input.style.animation="shake 0.35s ease";
    }
  });
  const totalTime=elapsed+penalty;
  resultsContainer.innerHTML="<h3>Game Over!</h3><p>Correct: <strong>"+correct+"/10</strong></p><p>Time: "+elapsed+"s + Penalty: "+penalty+"s = <strong>"+totalTime+"s</strong></p><h4>Feedback:</h4>";
  document.querySelectorAll("#questions input").forEach(input=>{
    if(normalize(input.value)!==normalize(input.dataset.answer)){
      const p=document.createElement("p");
      p.innerHTML="<strong>"+input.closest(".question-block").querySelector("strong").textContent+"</strong> → <span style='color:#27ae60;font-weight:800'>"+input.dataset.answer+"</span> | yours: <span style='color:#e74c3c;font-weight:700'>"+(input.value.trim()||"(blank)")+"</span>";
      resultsContainer.appendChild(p);
    }
  });
  const bestKey="bestTime_WasWere_Level"+currentLevel;
  const saved=localStorage.getItem(bestKey);
  if(!saved||totalTime<parseInt(saved)) localStorage.setItem(bestKey,totalTime);
  if(totalTime<=levelUnlockTime(currentLevel)&&unlockedLevels<currentLevel+1&&currentLevel<10){
    unlockedLevels=currentLevel+1;
    const u=document.createElement("p");
    u.style.color="#8855cc"; u.style.fontWeight="800"; u.style.fontSize="1.1rem";
    u.innerHTML="🔓 <strong>"+LEVEL_LABELS[currentLevel+1]+" Unlocked!</strong>";
    resultsContainer.appendChild(u);
  }
  if(correct===10){
    const cel=document.createElement("div");
    cel.className="perfect-celebration";
    cel.textContent="🎉 PERFECT! 🎉";
    resultsContainer.prepend(cel);
    setTimeout(()=>cel.remove(),5000);
  }
  const tryBtn=document.createElement("button");
  tryBtn.textContent="Try Again"; tryBtn.className="try-again";
  tryBtn.onclick=()=>startGame(currentLevel);
  resultsContainer.appendChild(tryBtn);
  const backBtn=document.createElement("button");
  backBtn.textContent="Back to Levels"; backBtn.id="back-button";
  backBtn.onclick=()=>renderLevels();
  resultsContainer.appendChild(backBtn);
});

function levelUnlockTime(level){ return 200+(level-1)*10; }
  </script>
</body>
</html>
